server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: vinilos-store

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:vinilos_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:VinylStoreSecretKey2024!SuperSecureAndLongEnoughForHS512Algorithm}
    expiration: ${JWT_EXPIRATION:86400000}  # 24 horas en ms
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
      client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
  payment:
    # Simulación: delay en milisegundos para el procesamiento
    processing-delay-ms: ${PAYMENT_DELAY_MS:2500}
    # Porcentaje de fallo para tarjetas no deterministas (0-100)
    random-failure-rate: ${PAYMENT_FAILURE_RATE:20}

# Logging
logging:
  level:
    com.vinilos: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
